name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "audify/**"
      - ".readthedocs.yaml"
  pull_request:
    paths:
      - "docs/**"
      - "audify/**"
      - ".readthedocs.yaml"
  release:
    types: [published]

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install documentation dependencies
        run: pip install -r docs/requirements.txt

      - name: Build documentation
        run: sphinx-build -W -b html docs docs/_build/html

      - name: Upload docs artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html/

  trigger-rtd-build:
    name: Trigger ReadTheDocs build for release
    if: github.event_name == 'release'
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ReadTheDocs build
        # ReadTheDocs automatically triggers builds via GitHub webhook
        # (configured via https://readthedocs.org/dashboard/audify/integrations/)
        # This step documents the process for version activation.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Release tag: $TAG"
          if [ -n "$RTD_TOKEN" ]; then
            curl -s -X PATCH \
              -H "Authorization: Token $RTD_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"active": true, "hidden": false}' \
              "https://readthedocs.org/api/v3/projects/audify/versions/$TAG/" \
              && echo "Version $TAG activated on ReadTheDocs" \
              || echo "Note: Version will be available but may need manual activation."
          fi
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
