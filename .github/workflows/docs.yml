name: Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "audify/**"
      - ".readthedocs.yaml"
      - ".github/workflows/docs.yml"
  pull_request:
  release:
    types: [published]

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Build documentation with uv
        run: |
          uv sync --frozen --group docs
          uv run task docs

      - name: Upload docs artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html/

  trigger-rtd-build:
    name: Trigger ReadTheDocs build for release
    if: github.event_name == 'release'
    needs: build-docs
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ReadTheDocs build
        # ReadTheDocs automatically triggers builds via GitHub webhook
        # (configured via https://readthedocs.org/dashboard/audify/integrations/)
        # This step documents the process for version activation.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Release tag: $TAG"
          if [ -z "$RTD_TOKEN" ]; then
            echo "RTD token not set: skipping version activation"
            exit 0
          fi
          response=$(curl -sS --fail -X PATCH \
            -H "Authorization: Token $RTD_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"active": true, "hidden": false}' \
            -w "\n%{http_code}" \
            "https://readthedocs.org/api/v3/projects/audify/versions/$TAG/")
          http_code=$(echo "$response" | tail -n1)
          if [ "$http_code" = "200" ]; then
            echo "Version $TAG activated on ReadTheDocs"
          else
            echo "Error: Failed to activate version $TAG (HTTP $http_code)"
            echo "$response"
            exit 1
          fi
        env:
          RTD_TOKEN: ${{ secrets.RTD_TOKEN }}
