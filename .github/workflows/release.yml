name: Release and Publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write  # Required for PyPI trusted publishing

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.check.outputs.released }}
      tag: ${{ steps.check.outputs.tag }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release needed
        id: check
        run: |
          # Read version from pyproject.toml (source of truth)
          VERSION=$(grep '^version = ' pyproject.toml | cut -d'"' -f2)
          TAG="v$VERSION"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          # Only release if this tag doesn't already exist
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "released=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists, skipping release"
          else
            echo "released=true" >> $GITHUB_OUTPUT
            echo "Will create release $TAG"
          fi

      - name: Get commit messages since last tag
        id: commits
        if: steps.check.outputs.released == 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            git log ${LAST_TAG}..HEAD --format='%s' > /tmp/subjects.txt
          else
            git log --format='%s' > /tmp/subjects.txt
          fi

          {
            echo 'list<<EOF'
            cat /tmp/subjects.txt
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create tag and release
        if: steps.check.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a "${{ steps.check.outputs.tag }}" -m "Release ${{ steps.check.outputs.version }}"
          git push origin "${{ steps.check.outputs.tag }}"

          gh release create "${{ steps.check.outputs.tag }}" \
            --title "Release ${{ steps.check.outputs.version }}" \
            --notes "## Changes in this release

          ### Commits
          \`\`\`
          ${{ steps.commits.outputs.list }}
          \`\`\`

          For detailed changes, see [all commits](${{ github.server_url }}/${{ github.repository }}/commits/${{ steps.check.outputs.tag }})"

  build:
    name: Build distribution
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [release, build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/audify-cli
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses trusted publishing (OIDC) - no API token needed
        # Configure at https://pypi.org/manage/project/audify-cli/settings/publishing/
